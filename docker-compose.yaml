services:
  db:
    image: postgres:16-alpine
    container_name: student_simulation_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: student_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d student_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: student_simulation_api
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/student_db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app